name: YouTube Daily Report

on:
  schedule:
    # Runs daily at 9:00 Thai Time (2:00 UTC)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Run YouTube Analyzer and Report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python3 src/youtube_analyzer.py --mode scrape
          python3 src/youtube_analyzer.py --mode report

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add analysis_history.json daily_report.md
          git commit -m "Update YouTube daily optimization report [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }}
